<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付检查功能测试</title>
    <link href="pay.css" rel="stylesheet" media="screen">
    <script src="https://lib.baomitu.com/jquery/3.3.1/jquery.min.js"></script>
    <style>
        body {
            padding: 20px;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .test-container {
            max-width: 400px;
            margin: 0 auto;
        }
        .test-controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .test-controls h3 {
            margin: 0 0 15px 0;
            color: #333;
        }
        .test-controls button {
            margin: 5px;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: white;
        }
        .btn-success {
            background: #07c160;
        }
        .btn-error {
            background: #ff6b6b;
        }
        .btn-loading {
            background: #1677ff;
        }
        .btn-manual {
            background: #666;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-controls">
            <h3>支付检查功能测试</h3>
            <p>测试各种支付检查场景的提示效果</p>
            <button class="btn-success" onclick="testSuccessPayment()">模拟支付成功</button>
            <button class="btn-error" onclick="testFailedCheck()">模拟检查失败</button>
            <button class="btn-error" onclick="testExpiredOrder()">模拟订单过期</button>
            <button class="btn-loading" onclick="testLoadingCheck()">模拟检查中</button>
            <button class="btn-manual" onclick="testManualCheck()">模拟手动检查</button>
        </div>
    </div>

    <!-- 支付成功跳转提示 -->
    <div id="successModal" class="success-modal" style="display:none;">
        <div class="success-modal-overlay"></div>
        <div class="success-modal-content">
            <div class="success-icon">✓</div>
            <h3>支付成功</h3>
            <p>您已支付成功，正在跳转...</p>
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <!-- 支付检查结果提示 -->
    <div id="checkResultModal" class="check-result-modal" style="display:none;">
        <div class="check-result-overlay"></div>
        <div class="check-result-content">
            <div class="check-result-icon" id="checkResultIcon">!</div>
            <h3 id="checkResultTitle">检查结果</h3>
            <p id="checkResultMessage">正在检查支付状态...</p>
            <button type="button" id="checkResultBtn" class="check-result-btn">确定</button>
        </div>
    </div>

    <script>
        // 显示支付成功提示
        function showSuccessModal() {
            var modal = document.getElementById('successModal');
            if (modal) {
                modal.style.display = 'flex';
                console.log('显示支付成功提示');
            }
        }

        // 隐藏支付成功提示
        function hideSuccessModal() {
            var modal = document.getElementById('successModal');
            if (modal) {
                modal.style.display = 'none';
            }
        }

        // 显示检查结果提示
        function showCheckResult(type, title, message) {
            var modal = document.getElementById('checkResultModal');
            var icon = document.getElementById('checkResultIcon');
            var titleEl = document.getElementById('checkResultTitle');
            var messageEl = document.getElementById('checkResultMessage');
            var btn = document.getElementById('checkResultBtn');
            
            if (modal && icon && titleEl && messageEl) {
                // 设置图标样式
                icon.className = 'check-result-icon ' + type;
                if (type === 'success') {
                    icon.textContent = '✓';
                } else if (type === 'error') {
                    icon.textContent = '✗';
                } else if (type === 'loading') {
                    icon.textContent = '⟳';
                }
                
                // 设置内容
                titleEl.textContent = title;
                messageEl.textContent = message;
                
                // 显示弹窗
                modal.style.display = 'flex';
                
                // 绑定确定按钮事件
                if (btn) {
                    btn.onclick = function() {
                        hideCheckResult();
                    };
                }
                
                console.log('显示检查结果:', type, title, message);
            }
        }

        // 隐藏检查结果提示
        function hideCheckResult() {
            var modal = document.getElementById('checkResultModal');
            if (modal) {
                modal.style.display = 'none';
            }
        }

        // 测试函数
        function testSuccessPayment() {
            showSuccessModal();
            setTimeout(function() {
                hideSuccessModal();
                alert('模拟跳转完成');
            }, 3000);
        }

        function testFailedCheck() {
            showCheckResult('error', '未检测到支付', '暂未检测到您的支付，请确认是否已完成支付');
        }

        function testExpiredOrder() {
            showCheckResult('error', '检查失败', '订单已过期，请重新下单');
        }

        function testLoadingCheck() {
            showCheckResult('loading', '正在检查', '正在检查您的支付状态，请稍候...');
            setTimeout(function() {
                showCheckResult('error', '未检测到支付', '暂未检测到您的支付，请确认是否已完成支付');
            }, 2000);
        }

        function testManualCheck() {
            showCheckResult('loading', '正在检查', '正在检查您的支付状态，请稍候...');
            setTimeout(function() {
                hideCheckResult();
                setTimeout(function() {
                    testSuccessPayment();
                }, 500);
            }, 1500);
        }
    </script>
</body>
</html>
