<div class="layui-form" action="">

    <div class="layui-form-item">
        <label class="layui-form-label">后台账号</label>
        <div class="layui-input-block">
            <input type="text" id="user" lay-verify="required" placeholder="请输入管理员账号" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">后台密码</label>
        <div class="layui-input-block">
            <input type="text" id="pass" lay-verify="required" placeholder="请输入管理员密码" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">订单有效期</label>
        <div class="layui-input-block">
            <input type="number" id="close" lay-verify="required" placeholder="请输入创建的订单几分钟后失效" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">异步回调</label>
        <div class="layui-input-block">
            <input type="text" id="notifyUrl" lay-verify="required" placeholder="请输入异步回调地址" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">同步回调</label>
        <div class="layui-input-block">
            <input type="text" id="returnUrl" lay-verify="required" placeholder="请输入支付完成后跳转地址" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">通讯密钥</label>
        <div class="layui-input-block">
            <input type="text" id="key" lay-verify="required" placeholder="请输入通讯密钥" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">区分方式</label>
        <div class="layui-input-block">
            <div class="layui-upload">
                <select id="payQf">
                    <option value="1">金额递增</option>
                    <option value="2">金额递减</option>
                </select>
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">微信码</label>
        <div class="layui-input-block">
            <div class="layui-upload">
                <button type="button" class="layui-btn" id="wxup">上传收款二维码</button>（此处上传的是无金额的收款二维码）
                <div class="layui-upload-list">
                    <img class="layui-upload-img" id="wximg">
                    <p id="wxcs"></p>
                </div>
            </div>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">支付宝码</label>
        <div class="layui-input-block">
            <div class="layui-upload">
                <button type="button" class="layui-btn" id="zfbup">上传收款二维码</button>（此处上传的是无金额的收款二维码）
                <div class="layui-upload-list">
                    <img class="layui-upload-img" id="zfbimg">
                    <p id="zfbcs"></p>
                </div>
            </div>
        </div>
    </div>



    <hr style="margin: 20px 0; border-color: #e6e6e6;">
    <div class="layui-form-item">
        <label class="layui-form-label" style="color: #1E9FFF; font-weight: bold;">易支付兼容</label>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">启用状态</label>
        <div class="layui-input-block">
            <select id="epay_enabled">
                <option value="0">关闭</option>
                <option value="1">开启</option>
            </select>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">商户ID(pid)</label>
        <div class="layui-input-block">
            <input type="text" id="epay_pid" placeholder="易支付商户号" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">商户名称</label>
        <div class="layui-input-block">
            <input type="text" id="epay_name" placeholder="订单显示名称，默认：订单支付" autocomplete="off" class="layui-input">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">MD5密钥(v1)</label>
        <div class="layui-input-block">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="epay_key" placeholder="留空则不更新，用于 v1 MD5 签名" autocomplete="off" class="layui-input" style="flex: 1;">
                <button type="button" class="layui-btn layui-btn-normal layui-btn-sm" onclick="generateMd5Key()" style="white-space: nowrap;">自动生成</button>
            </div>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">RSA密钥(v2)</label>
        <div class="layui-input-block">
            <button type="button" class="layui-btn layui-btn-normal layui-btn-sm" onclick="generateRsaKeys()">自动生成RSA密钥对</button>
            <span id="rsa_gen_tip" style="color: #999; font-size: 12px; margin-left: 10px;"></span>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">RSA私钥</label>
        <div class="layui-input-block">
            <textarea id="epay_private_key" placeholder="留空则不更新，PEM格式RSA私钥，用于 v2 签名" class="layui-textarea" style="height: 100px;"></textarea>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">RSA公钥</label>
        <div class="layui-input-block">
            <textarea id="epay_public_key" placeholder="留空则不更新，PEM格式RSA公钥，用于 v2 验签" class="layui-textarea" style="height: 100px;"></textarea>
        </div>
    </div>

    <div class="layui-form-item" style="text-align: right;">
        <button class="layui-btn" onclick="save()">保存</button>
    </div>

<script>
    function formatDate(now) {
        now = new Date(now*1000);
        return now.getFullYear()
            + "-" + (now.getMonth()>8?(now.getMonth()+1):"0"+(now.getMonth()+1))
            + "-" + (now.getDate()>9?now.getDate():"0"+now.getDate())
            + " " + (now.getHours()>9?now.getHours():"0"+now.getHours())
            + ":" + (now.getMinutes()>9?now.getMinutes():"0"+now.getMinutes())
            + ":" + (now.getSeconds()>9?now.getSeconds():"0"+now.getSeconds());

    }
    layui.use(['form','layer','upload'], function(){
        var table = layui.table,form = layui.form,upload = layui.upload;

        var uploadInst = upload.render({
            elem: '#wxup'
            , url: 'qr-code/test.php'
            ,auto: false
            ,choose: function(obj){
                console.log(obj)
                obj.preview(function(index, file, result){
                    qrcode.decode(getObjectURL(file));
                    qrcode.callback = function(imgMsg) {
                        console.log(imgMsg)
                        if(imgMsg!=""){
                            $('#wximg').attr('src', "enQrcode?url="+imgMsg);
                        }else{
                            layer.msg('处理中', {
                                icon: 16
                                ,shade: 0.01
                                ,time:0
                            });

                            $.post("qr-code/test.php","base64="+encodeURIComponent(result.split(",")[1]),function (data) {
                                console.log(data)
                                if (!data.data) {
                                    data = JSON.parse(data);
                                }
                                if (data.code==1){
                                    $('#wximg').attr('src', "enQrcode?url="+data.data);
                                    layer.msg('处理成功');
                                } else{
                                    return layer.alert('处理失败，可以尝试将二维码用草料识别出内容，然后重新将内容生成二维码图片上传！');
                                }

                            });
                        }
                    }
                });

            }
            , before: function (obj) {
                layer.msg('处理中', {
                    icon: 16
                    ,shade: 0.01
                    ,time:0
                });
            }
            , done: function (res) {
                //如果上传失败
                if (res.code == -1) {
                    return layer.msg('上传失败');
                }
                if (res.data==""){
                    return layer.msg('请上传微信无金额收款二维码');
                }
                layer.msg('处理成功');

                $('#wximg').attr('src', "enQrcode?url="+res.data);
            }
            , error: function () {
                layer.msg('上传失败');
                //演示失败状态，并实现重传
                var demoText = $('#wxcs');
                demoText.html('<span style="color: #FF5722;">上传失败</span> <a class="layui-btn layui-btn-xs wxcs">重试</a>');
                demoText.find('.wxcs').on('click', function () {
                    uploadInst.upload();
                });
            }
        });

        var uploadInst2 = upload.render({
            elem: '#zfbup'
            , url: 'qr-code/test.php'
            ,auto: false
            ,choose: function(obj){
                console.log(obj)
                obj.preview(function(index, file, result){
                    qrcode.decode(getObjectURL(file));
                    qrcode.callback = function(imgMsg) {
                        console.log(imgMsg)
                        if(imgMsg!=""){
                            $('#zfbimg').attr('src', "enQrcode?url="+imgMsg);
                        }else{
                            layer.msg('处理中', {
                                icon: 16
                                ,shade: 0.01
                                ,time:0
                            });
                            $.post("qr-code/test.php","base64="+encodeURIComponent(result.split(",")[1]),function (data) {
                                console.log(data)
                                if (!data.data) {
                                    data = JSON.parse(data);
                                }
                                if (data.code==1){
                                    $('#zfbimg').attr('src', "enQrcode?url="+data.data);
                                    layer.msg('处理成功');
                                } else{
                                    return layer.alert('处理失败，可以尝试将二维码用草料识别出内容，然后重新将内容生成二维码图片上传！');

                                }

                            });
                        }
                    }
                });

            }
            , before: function (obj) {
                layer.msg('处理中', {
                    icon: 16
                    ,shade: 0.01
                    ,time:0
                });
            }
            , done: function (res) {
                //如果上传失败
                if (res.code == -1) {
                    return layer.msg('上传失败');
                }
                if (res.data=="" ){
                    return layer.msg('请上传支付宝无金额收款二维码');
                }
                layer.msg('处理成功');

                $('#zfbimg').attr('src', "enQrcode?url="+res.data);
            }
            , error: function () {
                layer.msg('上传失败');

                //演示失败状态，并实现重传
                var demoText = $('#zfbcs');
                demoText.html('<span style="color: #FF5722;">上传失败</span> <a class="layui-btn layui-btn-xs zfbcs">重试</a>');
                demoText.find('.zfbcs').on('click', function () {
                    uploadInst2.upload();
                });
            }
        });
        form.render();

    });



    function save() {
        var user = $("#user").val();
        var pass = $("#pass").val();
        var notifyUrl = $("#notifyUrl").val();
        var returnUrl = $("#returnUrl").val();
        var key = $("#key").val();
        var close = $("#close").val();
        var payQf = $("#payQf").val();
        if (user == ""){
            layer.msg("请输入管理员账号");
            return;
        }
        if (pass == ""){
            layer.msg("请输入管理员密码");
            return;
        }
        if (key == ""){
            layer.msg("请输入通讯密钥");
            return;
        }
        if (notifyUrl == ""){
            layer.msg("请输入异步回调地址");
            return;
        }
        if (returnUrl == ""){
            layer.msg("请输入支付完成后跳转地址");
            return;
        }

        if (close == ""){
            layer.msg("请输入创建的订单几分钟后失效");
            return;
        }
        var wximg = $("#wximg").attr("src");
        if (wximg=="" || !wximg){
            layer.msg("请上传微信无金额的收款二维码");
            return;
        }
        var zfbimg = $("#zfbimg").attr("src");
        if (zfbimg=="" || !zfbimg){
            layer.msg("请上传支付宝无金额的收款二维码");
            return;
        }
        wximg = wximg.replace(/enQrcode\?url=/g,"");
        zfbimg = zfbimg.replace(/enQrcode\?url=/g,"");
        var epay_enabled = $("#epay_enabled").val();
        var epay_pid = $("#epay_pid").val();
        var epay_name = $("#epay_name").val();
        var epay_key = $("#epay_key").val();
        var epay_private_key = $("#epay_private_key").val();
        var epay_public_key = $("#epay_public_key").val();
        var postData = "user="+user+"&pass="+pass+"&notifyUrl="+notifyUrl+"&returnUrl="+returnUrl+"&key="+key+"&wxpay="+wximg+"&zfbpay="+zfbimg+"&close="+close+"&payQf="+payQf
            +"&epay_enabled="+epay_enabled+"&epay_pid="+encodeURIComponent(epay_pid)+"&epay_name="+encodeURIComponent(epay_name)
            +"&epay_key="+encodeURIComponent(epay_key)+"&epay_private_key="+encodeURIComponent(epay_private_key)+"&epay_public_key="+encodeURIComponent(epay_public_key);
        $.post("admin/index/saveSetting", postData, function (data) {
            if (data.code==1){
                $.post("admin/index/getSettings",function (data) {
                    console.log(data);
                    if (data.code==1){
                        $("#user").val(data.data.user);
                        $("#pass").val(data.data.pass);
                        $("#notifyUrl").val(data.data.notifyUrl);
                        $("#returnUrl").val(data.data.returnUrl);
                        $("#key").val(data.data.key);
                        $("#close").val(data.data.close);
                        $("#epay_enabled").val(data.data.epay_enabled || '0');
                        $("#epay_pid").val(data.data.epay_pid || '');
                        $("#epay_name").val(data.data.epay_name || '');
                        $("#epay_key").val('');
                        $("#epay_private_key").val('');
                        $("#epay_public_key").val(data.data.epay_public_key || '');

                        if (data.data.wxpay!=""){
                            $('#wximg').attr('src', "enQrcode?url="+data.data.wxpay);
                        }
                        if (data.data.zfbpay!=""){
                            $('#zfbimg').attr('src', "enQrcode?url="+data.data.zfbpay);
                        }
                        layui.form.render();
                    }
                });
            }
            layer.msg(data.msg);
        });
    }


    function getstate(){
        $.post("admin/index/getSettings",function (data) {
            console.log(data);
            if (data.code==1){
                $("#user").val(data.data.user);
                $("#pass").val(data.data.pass);
                $("#notifyUrl").val(data.data.notifyUrl);
                $("#returnUrl").val(data.data.returnUrl);
                $("#key").val(data.data.key);
                $("#close").val(data.data.close);
                $("#payQf").val(data.data.payQf);
                $("#epay_enabled").val(data.data.epay_enabled || '0');
                $("#epay_pid").val(data.data.epay_pid || '');
                $("#epay_name").val(data.data.epay_name || '');
                $("#epay_key").val('');
                $("#epay_private_key").val('');
                $("#epay_public_key").val(data.data.epay_public_key || '');

                if (data.data.wxpay!=""){
                    $('#wximg').attr('src', "enQrcode?url="+data.data.wxpay);
                }
                if (data.data.zfbpay!=""){
                    $('#zfbimg').attr('src', "enQrcode?url="+data.data.zfbpay);
                }
                layui.form.render();


            }
        });
    }
    function generateMd5Key() {
        var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        var key = '';
        for (var i = 0; i < 32; i++) {
            key += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        $("#epay_key").val(key);
        layer.msg('MD5密钥已生成，请点击保存');
    }

    function generateRsaKeys() {
        $("#rsa_gen_tip").text("生成中...");
        $.post("admin/index/generateRsaKeys", function (data) {
            if (data.code == 1) {
                $("#epay_private_key").val(data.data.private_key);
                $("#epay_public_key").val(data.data.public_key);
                $("#rsa_gen_tip").text("已生成，请点击保存").css("color", "#5FB878");
                layer.msg('RSA密钥对已生成，请点击保存');
            } else {
                $("#rsa_gen_tip").text("生成失败").css("color", "#FF5722");
                layer.msg(data.msg);
            }
        });
    }

    getstate();
</script>
